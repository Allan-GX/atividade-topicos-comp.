<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Git</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
		<h1>Cadatro de Usuario</h1>
	</header>

    <div class="conteiner">
        <form action="">
            <label for="nome">Nome: </label>
            <input type="text" placeholder="Digite seu nome..." id="nome" name="nome">

            <label for="data_nascimento">Data de Nascimento: </label>
            <input type="text" placeholder="dd/mm/aaaa..." id="data_nascimento" name="data_nascimento">

            <label for="email">Email: </label>
            <input type="email" placeholder="Digite seu email..." id="email" name="email">

            <label for="telefone">Telefone: </label>
            <input type="tel" placeholder="(00) 99999-9999" id="telefone" name="telefone">

            <button id="botao">Enviar Informações</button>
        </form>
    </div>
</body>
</html>
